<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Content365 – Create Your Pack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f9fafb;
      color: #1f2937;
    }
    h1 {
      color: #1e3a8a;
      text-align: center;
    }
    .coach-section {
      background: #e0f2fe;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .coach-section label {
      display: block;
      font-weight: 600;
      margin-top: 1rem;
    }
    .coach-section input, .coach-section textarea, .coach-section select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-top: 0.25rem;
    }
    .form-footer {
      text-align: center;
      margin-top: 2rem;
    }
    .submit-btn {
      padding: 0.8rem 1.5rem;
      background-color: #3b82f6;
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .submit-btn:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>

<h1>🧠 Your Marketing Coach – Content365</h1>

<form method="POST">
  <div class="coach-section">
    <p><strong>👋 Welcome!</strong> Let's create your high-converting content pack.</p>

    <label for="topic">What’s your main topic or niche?</label>
    <input type="text" name="topic" required placeholder="e.g. AI tools for marketers">

    <label for="audience">Who’s your target audience?</label>
    <input type="text" name="audience" required placeholder="e.g. solo founders, B2B SaaS teams">

    <label for="tone">What tone do you want?</label>
    <select name="tone" required>
      <option value="Professional">Professional</option>
      <option value="Casual">Casual</option>
      <option value="Witty">Witty</option>
      <option value="Persuasive">Persuasive</option>
    </select>

    <label for="platform">Which social platform are you focusing on?</label>
    <select name="platform" required>
      <option value="LinkedIn">LinkedIn</option>
      <option value="Instagram">Instagram</option>
      <option value="Twitter">Twitter</option>
      <option value="TikTok">TikTok</option>
      <option value="General">General Use</option>
    </select>

    <label for="notes">Any extra notes or goals?</label>
    <textarea name="notes" rows="4" placeholder="e.g. I want it to include a call to action for my free webinar"></textarea>
  </div>

  <div class="form-footer">
    <button class="submit-btn" type="submit">Generate My Content Pack 🚀</button>
  </div>
</form>

</body>
</html>
